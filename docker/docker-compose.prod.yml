version: '3.8'

services:
  #########################################
  # Your Production Rust App
  #########################################
  rust-app:
    # This tells Compose to build the image from the ./rust-app directory
    build:
      context: ./rust-app
      dockerfile: Dockerfile
    container_name: rust-app-prod
    environment:
      # For your app in PROD, it connects to the Postgres service name
      - DATABASE_URL=postgres://postgres:password@postgres-timescale:5432/main_db
      # Tell your app to log to stdout (see Rust code example)
      - LOG_TARGET=stdout
    networks:
      # Connect to the same network as the database and monitoring stack
      - monitoring-net
    labels:
      # Vector's 'docker_logs' source will pick this up
      - logging="true"
    depends_on:
      postgres-timescale:
        condition: service_healthy
      vector:
        condition: service_started
    restart: unless-stopped # Good policy for a prod service

# We must re-declare networks/volumes used by our new service
# as "external" so Compose knows they are defined in the base file.
networks:
  monitoring-net:
    external: true